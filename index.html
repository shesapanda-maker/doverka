<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Генератор доверенности</title>
  <style>
    :root {
      --bg: #f1eee8;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #ddd;
      --accent: #2d5c88;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin: 14px 0 6px;
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: white;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 13px 16px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    .preview-box {
      overflow: auto;
      text-align: center;
    }

    canvas {
      width: 100%;
      max-width: 760px;
      height: auto;
      background: #ddd;
      border: 1px solid #bbb;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Генератор доверенности</h1>
      <p>Заполни поля и скачай PDF, выглядящий как сфотографированный/отсканированный лист A4 на столе.</p>

      <label>ФИО доверителя</label>
      <input id="principalName" value="Иванов Иван Иванович">

      <label>Паспорт доверителя</label>
      <input id="principalPassport" value="серия 0000 № 000000, выдан ...">

      <label>Адрес доверителя</label>
      <input id="principalAddress" value="г. Новосибирск, ул. Ипподромская, д. 27, кв. 51">

      <label>ФИО представителя</label>
      <input id="agentName" value="Петров Пётр Петрович">

      <label>Паспорт представителя</label>
      <input id="agentPassport" value="серия 1111 № 111111, выдан ...">

      <label>Город</label>
      <input id="city" value="г. Новосибирск">

      <label>Дата доверенности</label>
      <input id="docDate" type="date">

      <label>Действует до</label>
      <input id="validUntil" type="date">

      <label>Для чего выдана доверенность</label>
      <textarea id="purpose">получения, подачи и подписания необходимых документов</textarea>

      <label>Сила эффекта</label>
      <select id="scanStrength">
        <option value="light">Лёгкий</option>
        <option value="medium" selected>Средний</option>
        <option value="heavy">Сильный</option>
      </select>

      <button onclick="renderAndDownload()">Скачать PDF</button>
      <button onclick="renderPreview()" style="background:#777;">Обновить предпросмотр</button>

      <div class="note">
        Всё работает в браузере. Данные не отправляются на сервер.
      </div>
    </section>

    <section class="card preview-box">
      <canvas id="sceneCanvas" width="1500" height="2000"></canvas>
    </section>
  </div>

  <script>
    const sceneCanvas = document.getElementById("sceneCanvas");
    const sceneCtx = sceneCanvas.getContext("2d");

    const PAGE_W = 1240;
    const PAGE_H = 1754;

    function todayISO() {
      const d = new Date();
      return d.toISOString().slice(0, 10);
    }

    function nextYearISO() {
      const d = new Date();
      d.setFullYear(d.getFullYear() + 1);
      return d.toISOString().slice(0, 10);
    }

    document.getElementById("docDate").value = todayISO();
    document.getElementById("validUntil").value = nextYearISO();

    function formatDate(iso) {
      if (!iso) return "";
      const [y, m, d] = iso.split("-");
      return `${d}.${m}.${y}`;
    }

    function getData() {
      return {
        principalName: document.getElementById("principalName").value.trim(),
        principalPassport: document.getElementById("principalPassport").value.trim(),
        principalAddress: document.getElementById("principalAddress").value.trim(),
        agentName: document.getElementById("agentName").value.trim(),
        agentPassport: document.getElementById("agentPassport").value.trim(),
        city: document.getElementById("city").value.trim(),
        docDate: formatDate(document.getElementById("docDate").value),
        validUntil: formatDate(document.getElementById("validUntil").value),
        purpose: document.getElementById("purpose").value.trim(),
        scanStrength: document.getElementById("scanStrength").value
      };
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(/\s+/);
      let line = "";

      for (let i = 0; i < words.length; i++) {
        const testLine = line ? line + " " + words[i] : words[i];
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          line = words[i];
          y += lineHeight;
        } else {
          line = testLine;
        }
      }

      if (line) {
        ctx.fillText(line, x, y);
        y += lineHeight;
      }

      return y;
    }

    function drawPaperDocument(data) {
      const pageCanvas = document.createElement("canvas");
      pageCanvas.width = PAGE_W;
      pageCanvas.height = PAGE_H;
      const ctx = pageCanvas.getContext("2d");

      // Paper base
      ctx.fillStyle = "#f7f7f2";
      ctx.fillRect(0, 0, PAGE_W, PAGE_H);

      // Slight paper tint
      const grad = ctx.createLinearGradient(0, 0, PAGE_W, PAGE_H);
      grad.addColorStop(0, "rgba(255,255,255,0.24)");
      grad.addColorStop(0.55, "rgba(235,235,225,0.12)");
      grad.addColorStop(1, "rgba(210,210,200,0.20)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, PAGE_W, PAGE_H);

      // Very light paper fibres
      ctx.save();
      ctx.globalAlpha = 0.05;
      for (let i = 0; i < 900; i++) {
        const x = Math.random() * PAGE_W;
        const y = Math.random() * PAGE_H;
        const len = 4 + Math.random() * 18;
        ctx.strokeStyle = Math.random() > 0.5 ? "#777" : "#fff";
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + len, y + Math.random() * 2);
        ctx.stroke();
      }
      ctx.restore();

      // Text
      const margin = 115;
      let y = 135;

      ctx.fillStyle = "#242424";
      ctx.textBaseline = "top";
      ctx.font = "bold 42px Georgia, 'Times New Roman', serif";
      ctx.textAlign = "center";
      ctx.fillText("ДОВЕРЕННОСТЬ", PAGE_W / 2, y);
      y += 95;

      ctx.textAlign = "left";
      ctx.font = "28px Georgia, 'Times New Roman', serif";
      ctx.fillText(`${data.city}, ${data.docDate}`, margin, y);
      y += 75;

      const body =
        `Я, ${data.principalName || "________________________"}, паспорт: ${data.principalPassport || "________________________"}, ` +
        `зарегистрированный(ая) по адресу: ${data.principalAddress || "________________________"}, ` +
        `настоящей доверенностью уполномочиваю ${data.agentName || "________________________"}, ` +
        `паспорт: ${data.agentPassport || "________________________"}, представлять мои интересы по вопросу: ` +
        `${data.purpose || "________________________"}.`;

      y = wrapText(ctx, body, margin, y, PAGE_W - margin * 2, 45);
      y += 35;

      y = wrapText(ctx, `Доверенность выдана сроком до: ${data.validUntil}.`, margin, y, PAGE_W - margin * 2, 45);
      y += 95;

      ctx.fillText("Подпись доверителя: ______________________", margin, y);
      y += 60;
      ctx.font = "23px Georgia, 'Times New Roman', serif";
      ctx.fillStyle = "#444";
      ctx.fillText(data.principalName || "________________________", margin, y);

      // Degrade text/page a little
      addImageNoise(ctx, PAGE_W, PAGE_H, data.scanStrength, true);

      return pageCanvas;
    }

    function addImageNoise(ctx, width, height, strength, subtle=false) {
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;

      const amountMap = subtle
        ? { light: 0.006, medium: 0.013, heavy: 0.025 }
        : { light: 0.012, medium: 0.025, heavy: 0.045 };

      const amount = amountMap[strength] || amountMap.medium;

      for (let i = 0; i < data.length; i += 4) {
        if (Math.random() < amount) {
          const n = Math.floor(Math.random() * 42) - 20;
          data[i] = Math.max(0, Math.min(255, data[i] + n));
          data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + n));
          data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + n));
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    function roundedTableBackground(ctx, w, h) {
      // tabletop / scanner-bed background
      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, "#b9b3aa");
      grad.addColorStop(0.45, "#9f998f");
      grad.addColorStop(1, "#817b72");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // table texture
      ctx.save();
      ctx.globalAlpha = 0.08;
      for (let i = 0; i < 2200; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const len = 10 + Math.random() * 45;
        ctx.strokeStyle = Math.random() > 0.5 ? "#fff" : "#333";
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + len, y + Math.random() * 4 - 2);
        ctx.stroke();
      }
      ctx.restore();

      // vignette
      const radial = ctx.createRadialGradient(w/2, h/2, w*0.25, w/2, h/2, w*0.75);
      radial.addColorStop(0, "rgba(255,255,255,0.08)");
      radial.addColorStop(1, "rgba(0,0,0,0.22)");
      ctx.fillStyle = radial;
      ctx.fillRect(0, 0, w, h);
    }

    function renderPreview() {
      const d = getData();
      const ctx = sceneCtx;
      const w = sceneCanvas.width;
      const h = sceneCanvas.height;

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, w, h);

      roundedTableBackground(ctx, w, h);

      const page = drawPaperDocument(d);

      // Draw shadow and page as if it lies on a table.
      const scale = 0.86;
      const drawW = PAGE_W * scale;
      const drawH = PAGE_H * scale;
      const x = (w - drawW) / 2 + 10;
      const y = (h - drawH) / 2 - 5;

      const angleMap = { light: -0.012, medium: -0.018, heavy: -0.025 };
      const angle = angleMap[d.scanStrength] + (Math.random() - 0.5) * 0.01;

      ctx.save();
      ctx.translate(w / 2, h / 2);
      ctx.rotate(angle);
      ctx.translate(-w / 2, -h / 2);

      // soft page shadow
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.42)";
      ctx.shadowBlur = d.scanStrength === "heavy" ? 34 : 24;
      ctx.shadowOffsetX = 22;
      ctx.shadowOffsetY = 28;
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(x, y, drawW, drawH);
      ctx.restore();

      // page border + page image
      ctx.drawImage(page, x, y, drawW, drawH);

      // slightly darker edge
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, drawW, drawH);

      ctx.restore();

      // Lens/scanner imperfection over whole output
      addImageNoise(ctx, w, h, d.scanStrength, false);

      // Slight horizontal scanner lines
      ctx.save();
      ctx.globalAlpha = d.scanStrength === "heavy" ? 0.08 : 0.04;
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 1;
      const lineCount = d.scanStrength === "heavy" ? 12 : d.scanStrength === "medium" ? 7 : 3;
      for (let i = 0; i < lineCount; i++) {
        const yy = Math.random() * h;
        ctx.beginPath();
        ctx.moveTo(0, yy);
        ctx.lineTo(w, yy + Math.random() * 3);
        ctx.stroke();
      }
      ctx.restore();
    }

    function dataURLToBinaryString(dataURL) {
      const base64 = dataURL.split(",")[1];
      return atob(base64);
    }

    function makePdfFromCanvas(canvas) {
      const jpegDataURL = canvas.toDataURL("image/jpeg", 0.76);
      const imgBinary = dataURLToBinaryString(jpegDataURL);
      const imgLength = imgBinary.length;

      // Landscape-ish image inside portrait A4 PDF.
      const pageW = 595.28;
      const pageH = 841.89;

      const objects = [];

      objects.push("<< /Type /Catalog /Pages 2 0 R >>");
      objects.push("<< /Type /Pages /Kids [3 0 R] /Count 1 >>");
      objects.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>`);
      objects.push(`<< /Type /XObject /Subtype /Image /Width ${canvas.width} /Height ${canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imgLength} >>\nstream\n${imgBinary}\nendstream`);

      const imgRatio = canvas.width / canvas.height;
      const pageRatio = pageW / pageH;

      let drawW, drawH, drawX, drawY;
      if (imgRatio > pageRatio) {
        drawW = pageW;
        drawH = pageW / imgRatio;
        drawX = 0;
        drawY = (pageH - drawH) / 2;
      } else {
        drawH = pageH;
        drawW = pageH * imgRatio;
        drawX = (pageW - drawW) / 2;
        drawY = 0;
      }

      const content = `q\n${drawW} 0 0 ${drawH} ${drawX} ${drawY} cm\n/Im0 Do\nQ`;
      objects.push(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`);

      let pdf = "%PDF-1.4\n";
      const offsets = [0];

      for (let i = 0; i < objects.length; i++) {
        offsets.push(pdf.length);
        pdf += `${i + 1} 0 obj\n${objects[i]}\nendobj\n`;
      }

      const xrefPos = pdf.length;
      pdf += `xref\n0 ${objects.length + 1}\n`;
      pdf += "0000000000 65535 f \n";
      for (let i = 1; i < offsets.length; i++) {
        pdf += String(offsets[i]).padStart(10, "0") + " 00000 n \n";
      }

      pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\n`;
      pdf += `startxref\n${xrefPos}\n%%EOF`;

      const bytes = new Uint8Array(pdf.length);
      for (let i = 0; i < pdf.length; i++) {
        bytes[i] = pdf.charCodeAt(i) & 0xff;
      }

      return new Blob([bytes], { type: "application/pdf" });
    }

    function renderAndDownload() {
      renderPreview();

      const blob = makePdfFromCanvas(sceneCanvas);
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "doverennost_scan_table.pdf";
      document.body.appendChild(a);
      a.click();

      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 1000);
    }

    renderPreview();
  </script>
</body>
</html>
